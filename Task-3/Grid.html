<!-- 3. **Responsive Grid Layout**
    - **Objective:** Create a grid layout that displays multiple items.
    - **Requirements:**
        - Use CSS Grid to arrange items in three columns on desktop screens.
        - Adjust the grid to stack items in a single column on mobile devices using media queries.
        - Ensure consistent spacing and alignment between items. -->

<!DOCTYPE html>
<html>
    <head>
        <title>Grid Layout</title>
        <style>
            body{
                display: flex;
                flex-direction: column;
                text-align: center;
                align-items: center;

            }
            .grid-container{
                display: grid;
                grid-template-columns: 50px 50px 50px;
                gap:100px;                
            }
            .grid-item{
                width:100px;
                height:100px;
                padding: 10px;
                background-color: rgb(139, 157, 163);
                border: 1px solid black;
            }
            @media (max-width: 600px) {
                .grid-container{
                    grid-template-columns: auto;
                }
            }

        </style>
       
    </head>
    <body>
        <h1>Responsive Grid Layout</h1>
        <div class="grid-container">
            <div class="grid-item">Item 1</div>
            <div class="grid-item">Item 2</div>
            <div class="grid-item">Item 3</div>  
            <div class="grid-item">Item 4</div>
            <div class="grid-item">Item 5</div>
            <div class="grid-item">Item 6</div>          
    </body>
</html>

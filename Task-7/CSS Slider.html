<!-- 7. **Pure CSS Carousel/Slider**
    - **Objective:** Develop an image carousel that cycles through slides automatically and/or manually.
    - **Requirements:**
        - Use CSS animations (`@keyframes`) to create an auto-sliding effect.
        - Implement manual slide selection using the `:checked` pseudo-class with hidden radio buttons or the `:target` pseudo-class.
        - Ensure that the slider is responsive and visually engaging. -->

<!DOCTYPE html>
<html>
    <head>
    <title>Pure CSS Slider</title>

        <style>

        body{
            margin:0;
            font-family: Arial;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .slider{
            width: 60%;
            height: 400px;
            margin: 50px auto;
            overflow: hidden;
            position: relative;
        }

        .slides{
            display: flex;
            width: 400%;
            height: 100%;
            animation: autoSlide 16s infinite;
        }

        .slide{
            width: 100%;
            flex-shrink: 0;
        }

        .slide img{
            width: 60%;
            height: 100%;
            object-fit: cover;
        }

        input{
            display: none;
        }

        .navigation{
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
        }

        .navigation label{
            width: 15px;
            height: 15px;
            border: 2px solid white;
            border-radius: 50%;
            margin: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .navigation label:hover{
            background: white;
        }

        #slide1:checked ~ .slides{
            animation: none;
            transform: translateX(0);
        }

        #slide2:checked ~ .slides{
            animation: none;
            transform: translateX(-100%);
        }

        #slide3:checked ~ .slides{
            animation: none;
            transform: translateX(-200%);
        }

        #slide4:checked ~ .slides{
            animation: none;
            transform: translateX(-300%);
        }

        @keyframes autoSlide{
            0%,20%{ transform: translateX(0); }
            25%,45%{ transform: translateX(-100%); }
            50%,70%{ transform: translateX(-200%); }
            75%,95%{ transform: translateX(-300%); }
            100%{ transform: translateX(0); }
        }

        .slides{
            transition: transform 0.6s ease;
        }

        .slider:hover .slides{
            animation-play-state: paused;
        }

        </style>
    </head>

    <body>
    <h1>Pure CSS Slider</h1>
        <div class="slider">

            <input type="radio" name="slider" id="slide1">
            <input type="radio" name="slider" id="slide2">
            <input type="radio" name="slider" id="slide3">
            <input type="radio" name="slider" id="slide4">

            <div class="slides">
                <div class="slide">
                    <img src="img1.jpg">
                </div>
                <div class="slide">
                    <img src="img2.jpg">
                </div>
                <div class="slide">
                    <img src="img3.jpg">
                </div>
                <div class="slide">
                    <img src="img4.jpg">
                </div>
            </div>

            <div class="navigation">
                <label for="slide1"></label>
                <label for="slide2"></label>
                <label for="slide3"></label>
                <label for="slide4"></label>
            </div>

        </div>

    </body>
</html>

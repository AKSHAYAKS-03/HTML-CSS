<!-- 8. **CSS Accordion Component**
    - **Objective:** Build an accordion where content sections expand and collapse on click.
    - **Requirements:**
        - Use the checkbox hack (a hidden checkbox input with a label) or the `:target` pseudo-class to control the open/closed state of each section.
        - Apply CSS transitions to animate the expansion and collapse of content areas.
        - Allow multiple sections to be open simultaneously (if desired) or restrict it to one open section at a time. -->
<!DOCTYPE html>
<html>
    <head>
        <title>Accordion Component</title>
        <style>

            body{
                padding:20px;
                display:flex;
                flex-direction:column;
                align-items:center;
            }

            input{
                display:none;
            }

            label{
                display:block;
                width:300px;
                padding:15px;
                background:#e3e3e3;
                cursor:pointer;
                border-radius:5px;
                margin-top:10px;
            }

            .content{
                max-height:0;
                width:300px;
                background:#d3d0d5;
                overflow:hidden;
                opacity:0;
                padding:0 15px;
                transition: all 0.4s ease;
                color:black;
                border-radius:5px;
            }

            #section1:checked + label + .content,
            #section2:checked + label + .content,
            #section3:checked + label + .content{
                max-height:200px;
                padding:15px;
                opacity:1;
            }

        </style>
    </head>
    <body>

        <h1>Accordion Component</h1>

        <div class="accordion">

            <input type="checkbox" id="section1">
            <label for="section1">Name</label>
            <div class="content">
                <p>Akshaya K S</p>
            </div>

            <input type="checkbox" id="section2">
            <label for="section2">Email</label>
            <div class="content">
                <p>akshaya@gmail.com</p>
            </div>

            <input type="checkbox" id="section3">
            <label for="section3">College</label>
            <div class="content">
                <p>Velammal College of Engineering</p>
            </div>

        </div>

    </body>
</html>
